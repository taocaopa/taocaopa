name: Profile Update

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Update README with last updated timestamp
      run: |
        # Get current date in nice format
        DATE=$(date '+%Y-%m-%d %H:%M:%S UTC')
        
        # Check if README already has a last updated line
        if grep -q "<!-- LAST_UPDATED:" README.md; then
          # Replace existing timestamp
          sed -i "s/<!-- LAST_UPDATED:.*-->/<!-- LAST_UPDATED: $DATE -->/" README.md
        else
          # Add timestamp at the end of README
          echo "" >> README.md
          echo "---" >> README.md
          echo "" >> README.md
          echo "🤖 **Last Updated**: $DATE via GitHub Actions" >> README.md
          echo "<!-- LAST_UPDATED: $DATE -->" >> README.md
        fi
    
    - name: Configure Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
    
    - name: Check for changes
      id: verify-changed-files
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Commit changes
      if: steps.verify-changed-files.outputs.changed == 'true'
      run: |
        git add README.md
        git commit -m "docs: update last updated timestamp"
    
    - name: Push changes
      if: steps.verify-changed-files.outputs.changed == 'true'
      run: |
        git push origin ${{ github.ref_name }}
